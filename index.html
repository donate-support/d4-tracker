<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4 Live Tracker</title>
    <style>
        body {
            background-color: #0f0f12;
            color: #d1d1d6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .card {
            background-color: #1c1c1e;
            border: 1px solid #3a3a3c;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .boss-card { border-left: 5px solid #ff453a; }
        .helltide-card { border-left: 5px solid #ff9f0a; }
        h2 { margin: 0 0 10px 0; font-size: 1.4rem; color: #fff; }
        .timer { font-size: 2.5rem; font-weight: 700; font-variant-numeric: tabular-nums; margin: 15px 0; }
        .boss-card .timer { color: #ff453a; }
        .helltide-card .timer { color: #ff9f0a; }
        button {
            background-color: #2c2c2e;
            color: #fff;
            border: 1px solid #48484a;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background-color: #3a3a3c; }
        .status-badge { font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-badge" id="audio-status" style="color: #ff453a;">Audio Disattivato 🔇 (Clicca sotto per abilitarlo)</div>
    <button id="enable-audio" style="margin-bottom: 30px;">Abilita Alert Sonori</button>

    <!-- CARD WORLD BOSS -->
    <div class="card boss-card">
        <h2>Prossimo World Boss</h2>
        <div class="timer" id="boss-timer">--:--:--</div>
        <div id="boss-name" style="color: #aeaeae; font-style: italic;">In attesa di dati...</div>
    </div>

    <!-- CARD HELLTIDE -->
    <div class="card helltide-card">
        <h2>Marea Infernale (Helltide)</h2>
        <div class="timer" id="helltide-timer">--:--:--</div>
        <div id="helltide-zone" style="color: #aeaeae; font-style: italic;">In attesa di dati...</div>
    </div>
</div>

<audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

<script>
    let audioEnabled = false;
    let bossAlertFired = false;
    let helltideAlertFired = false;
    
    let bossTargetTime = 0;
    let helltideTargetTime = 0;

    const alertSound = document.getElementById('alert-sound');
    
    document.getElementById('enable-audio').addEventListener('click', function() {
        audioEnabled = true;
        const badge = document.getElementById('audio-status');
        badge.innerText = "Alert Audio Attivi 🔊";
        badge.style.color = "#30d158";
        this.style.display = 'none';
        alertSound.play().then(() => alertSound.pause());
    });

    async function fetchTimers() {
        try {
            const response = await fetch('./data.json?t=' + Date.now());
            const data = await response.json();
            
            // Lettura nuova struttura dati di d4gg.io
            if (data.boss) {
                bossTargetTime = data.boss.expected * 1000;
                document.getElementById('boss-name').innerText = data.boss.name || "Boss Confermato";
            }
            
            if (data.helltide) {
                helltideTargetTime = data.helltide.expected * 1000;
                document.getElementById('helltide-zone').innerText = data.helltide.zone ? "Zona: " + data.helltide.zone : "Marea Infernale";
            }
        } catch (e) {
            console.error("Errore lettura JSON:", e);
        }
    }

    function formatCountdown(distance) {
        if (distance < 0) return "IN CORSO";
        const hours = Math.floor((distance / (1000 * 60 * 60)));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateCountdowns() {
        const now = Date.now();

        if (bossTargetTime > 0) {
            const bossDiff = bossTargetTime - now;
            document.getElementById('boss-timer').innerText = formatCountdown(bossDiff);
            
            // Allarme 10 minuti prima
            if (bossDiff > 0 && bossDiff <= 600000 && !bossAlertFired) {
                if (audioEnabled) alertSound.play();
                bossAlertFired = true;
            }
            if (bossDiff > 600000 || bossDiff < 0) bossAlertFired = false;
        }

        if (helltideTargetTime > 0) {
            const helltideDiff = helltideTargetTime - now;
            document.getElementById('helltide-timer').innerText = formatCountdown(helltideDiff);

            // Allarme 5 minuti prima
            if (helltideDiff > 0 && helltideDiff <= 300000 && !helltideAlertFired) {
                if (audioEnabled) alertSound.play();
                helltideAlertFired = true;
            }
            if (helltideDiff > 300000 || helltideDiff < 0) helltideAlertFired = false;
        }
    }

    fetchTimers();
    setInterval(fetchTimers, 60000); // Controlla aggiornamenti file ogni minuto
    setInterval(updateCountdowns, 1000);
</script>

</body>
</html>
